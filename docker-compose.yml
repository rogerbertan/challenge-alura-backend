services:
  api:
    build: .
    ports:
      - "8080:8080"
    environment:
      - SPRING_DATASOURCE_URL=jdbc:postgresql://db:5432/reservas
      - DB_USER=reservas
      - DB_PASS=reservas
    depends_on:
      db:
        condition: service_healthy

  db:
    image: postgres:16
    environment:
      - POSTGRES_DB=reservas
      - POSTGRES_USER=reservas
      - POSTGRES_PASSWORD=reservas
    ports:
      - "5432:5432"
    volumes:
      - postgres_data_reservas:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U reservas -d reservas"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data_reservas: